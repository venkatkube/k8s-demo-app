apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: dev-
namespace: demo-dev

resources:
  - ../../base

images:
  - name: ghcr.io/your-github-username/k8s-demo-app
    newTag: dev

patches:
  - target:
      kind: Deployment
      name: k8s-demo-app
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: k8s-demo-app
      spec:
        replicas: 1

