apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-demo-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-github-username/k8s-demo-app.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

